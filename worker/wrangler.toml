name = "selekt-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
MAX_FILE_SIZE_MB = "30"

# Storage (MB/month) — Pricing.html準拠
FREE_MONTHLY_STORAGE_MB = "10240"
BASIC_MONTHLY_STORAGE_MB = "51200"
PRO_MONTHLY_STORAGE_MB = "307200"

# Photos per session (unlimited)
FREE_MAX_PHOTOS = "99999"
BASIC_MAX_PHOTOS = "99999"
PRO_MAX_PHOTOS = "99999"

# Session TTL (days) — Pricing.html準拠
FREE_SESSION_TTL = "10"
BASIC_SESSION_TTL = "30"
PRO_SESSION_TTL = "90"

# Sessions per month
FREE_MAX_SESSIONS = "3"
BASIC_MAX_SESSIONS = "10"
PRO_MAX_SESSIONS = "9999"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "selekt-photos"

[[kv_namespaces]]
binding = "USERS"
id = "732be010c98a44b4aa9832dc6e4674af"
