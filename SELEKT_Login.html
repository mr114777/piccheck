<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELEKT — ログイン</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0D0F14;
            --surface: #13161E;
            --surface2: #1A1E28;
            --surface3: #222736;
            --border: #2A2F3E;
            --border2: #333849;
            --text: #E8EAF0;
            --text-sub: #7B849A;
            --text-dim: #454C60;
            --accent: #4A9EE0;
            --accent2: #3BBFA5;
            --coral: #FF6B6B;
            --heading-font: 'Syne', sans-serif;
            --body-font: 'Zen Kaku Gothic New', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--body-font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Left Panel (Branding) ── */
        .brand-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(74, 158, 224, 0.22) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 107, 107, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(59, 191, 165, 0.15) 0%, transparent 50%),
                var(--bg);
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .brand-logo {
            font-family: var(--heading-font);
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--text);
            margin-bottom: 16px;
        }

        .brand-logo span {
            opacity: 0.5;
        }

        .brand-tagline {
            font-size: 14px;
            color: var(--text-sub);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand-features {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .brand-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text-sub);
        }

        .brand-feature-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(74, 158, 224, 0.1);
            border: 1px solid rgba(74, 158, 224, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* ── Right Panel (Auth Form) ── */
        .auth-panel {
            width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 48px;
            background: var(--surface);
            border-left: 1px solid var(--border);
        }

        .auth-header {
            margin-bottom: 36px;
        }

        .auth-title {
            font-family: var(--heading-font);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 13px;
            color: var(--text-sub);
        }

        /* ── Tab Toggle ── */
        .auth-tabs {
            display: flex;
            background: var(--surface2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-sub);
            border: none;
            background: transparent;
        }

        .auth-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(74, 158, 224, 0.3);
        }

        .auth-tab:not(.active):hover {
            color: var(--text);
        }

        /* ── Form ── */
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 18px;
        }

        .auth-form.active {
            display: flex;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            color: var(--text);
            font-family: var(--body-font);
            transition: all 0.25s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 158, 224, 0.12);
        }

        .form-input::placeholder {
            color: var(--text-dim);
        }

        /* ── Submit Button ── */
        .auth-submit {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--body-font);
            margin-top: 4px;
        }

        .auth-submit:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(74, 158, 224, 0.35);
        }

        .auth-submit:active {
            transform: translateY(0);
        }

        .auth-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Divider ── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 4px 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-divider span {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── Social Login ── */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: var(--body-font);
        }

        .social-btn:hover {
            border-color: var(--text-sub);
            background: var(--surface3);
        }

        .social-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ── Error/Success Message ── */
        .auth-message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            display: none;
        }

        .auth-message.error {
            display: block;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.25);
            color: var(--coral);
        }

        .auth-message.success {
            display: block;
            background: rgba(59, 191, 165, 0.1);
            border: 1px solid rgba(59, 191, 165, 0.25);
            color: var(--accent2);
        }

        /* ── Loading Spinner ── */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Forgot password link ── */
        .forgot-link {
            text-align: right;
            margin-top: -10px;
        }

        .forgot-link a {
            font-size: 12px;
            color: var(--accent);
            text-decoration: none;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        /* ── Password strength ── */
        .pw-strength {
            height: 3px;
            border-radius: 2px;
            background: var(--border);
            margin-top: 4px;
            overflow: hidden;
        }

        .pw-strength-bar {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0;
        }

        /* ── Footer ── */
        .auth-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
        }

        .auth-footer a {
            color: var(--text-sub);
            text-decoration: none;
        }

        .auth-footer a:hover {
            color: var(--accent);
        }

        /* ── Responsive ── */
        @media (max-width: 960px) {
            .brand-panel { display: none; }
            .auth-panel {
                width: 100%;
                border-left: none;
            }
        }

        @media (max-width: 480px) {
            .auth-panel {
                padding: 32px 24px;
            }
        }

        /* ── Floating orbs (decorative) ── */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px; height: 300px;
            background: rgba(74, 158, 224, 0.2);
            top: 10%; left: 10%;
        }

        .orb-2 {
            width: 200px; height: 200px;
            background: rgba(255, 107, 107, 0.15);
            bottom: 20%; right: 20%;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(59, 191, 165, 0.12);
            top: 60%; left: 30%;
            animation-delay: -2s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(15px, -20px); }
            66% { transform: translate(-10px, 15px); }
        }
    </style>
</head>

<body>
    <!-- LEFT: Branding Panel -->
    <div class="brand-panel">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="brand-content">
            <div class="brand-logo">SE<span>LEKT</span></div>
            <div class="brand-tagline">Photo Selection Platform</div>

            <div class="brand-features">
                <div class="brand-feature">
                    <div class="brand-feature-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></div>
                    <span>Select smarter. 写真セレクトを、もっと賢く</span>
                </div>
                <div class="brand-feature">
                    <div class="brand-feature-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
                    <span>Any device. スマホでもPCでも、どこでもセレクト</span>
                </div>
                <div class="brand-feature">
                    <div class="brand-feature-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
                    <span>One click share. 共有はリンク一つ</span>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT: Auth Panel -->
    <div class="auth-panel">
        <div class="auth-header">
            <div class="auth-title" id="authTitle">ログイン</div>
            <div class="auth-subtitle" id="authSubtitle">アカウントにサインインしてください</div>
        </div>

        <!-- Tab Toggle -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
            <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">新規登録</button>
        </div>

        <!-- Message Area -->
        <div class="auth-message" id="authMessage"></div>

        <!-- LOGIN FORM -->
        <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">メールアドレス</label>
                <input class="form-input" type="email" id="loginEmail" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">パスワード</label>
                <input class="form-input" type="password" id="loginPassword" placeholder="パスワードを入力" required>
            </div>
            <div class="forgot-link">
                <a href="#" onclick="handleForgotPassword(event)">パスワードを忘れた方</a>
            </div>
            <button type="submit" class="auth-submit" id="loginBtn">ログイン</button>

            <div class="auth-divider"><span>or</span></div>

            <button type="button" class="social-btn" onclick="handleGoogleLogin()">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Googleでログイン
            </button>
        </form>

        <!-- SIGNUP FORM -->
        <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label class="form-label">表示名</label>
                <input class="form-input" type="text" id="signupName" placeholder="カメラマン太郎" required>
            </div>
            <div class="form-group">
                <label class="form-label">メールアドレス</label>
                <input class="form-input" type="email" id="signupEmail" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">パスワード</label>
                <input class="form-input" type="password" id="signupPassword" placeholder="8文字以上"
                    minlength="8" required oninput="checkPasswordStrength(this.value)">
                <div class="pw-strength">
                    <div class="pw-strength-bar" id="pwStrengthBar"></div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">パスワード確認</label>
                <input class="form-input" type="password" id="signupPasswordConfirm" placeholder="もう一度入力" required>
            </div>
            <button type="submit" class="auth-submit" id="signupBtn">アカウント作成</button>

            <div class="auth-divider"><span>or</span></div>

            <button type="button" class="social-btn" onclick="handleGoogleLogin()">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Googleで新規登録
            </button>
        </form>

        <div class="auth-footer">
            <p>ログインすることで、<a href="#">利用規約</a>と<a href="#">プライバシーポリシー</a>に同意します</p>
        </div>
    </div>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <script>
        // ===== TAB SWITCHING =====
        function switchTab(tab) {
            const loginTab = document.getElementById('tabLogin');
            const signupTab = document.getElementById('tabSignup');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');
            const msg = document.getElementById('authMessage');

            msg.className = 'auth-message';
            msg.textContent = '';

            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                title.textContent = 'ログイン';
                subtitle.textContent = 'アカウントにサインインしてください';
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                title.textContent = '新規登録';
                subtitle.textContent = '無料でアカウントを作成';
            }
        }

        // ===== LOGIN =====
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> ログイン中...';
            hideMessage();

            const { data, error } = await signInWithEmail(email, password);

            if (error) {
                showMessage(getErrorMessage(error), 'error');
                btn.disabled = false;
                btn.textContent = 'ログイン';
            } else {
                showMessage('ログイン成功！リダイレクトしています...', 'success');
                setTimeout(() => redirectAfterAuth(data.user), 800);
            }
        }

        // ===== SIGNUP =====
        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupPasswordConfirm').value;

            if (password !== confirm) {
                showMessage('パスワードが一致しません', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 登録中...';
            hideMessage();

            const { data, error } = await signUpWithEmail(email, password, name);

            if (error) {
                showMessage(getErrorMessage(error), 'error');
                btn.disabled = false;
                btn.textContent = 'アカウント作成';
            } else {
                showMessage('確認メールを送信しました！メールを確認してください。', 'success');
                btn.disabled = false;
                btn.textContent = 'アカウント作成';
            }
        }

        // ===== GOOGLE LOGIN =====
        async function handleGoogleLogin() {
            const { data, error } = await signInWithGoogle();
            if (error) {
                showMessage(getErrorMessage(error), 'error');
            }
        }

        // ===== FORGOT PASSWORD =====
        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            if (!email) {
                showMessage('メールアドレスを入力してからクリックしてください', 'error');
                return;
            }

            const { error } = await _sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/SELEKT_Profile.html'
            });

            if (error) {
                showMessage(getErrorMessage(error), 'error');
            } else {
                showMessage('パスワードリセットメールを送信しました', 'success');
            }
        }

        // ===== PASSWORD STRENGTH =====
        function checkPasswordStrength(pw) {
            const bar = document.getElementById('pwStrengthBar');
            let score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;

            const pct = Math.min(score / 5 * 100, 100);
            bar.style.width = pct + '%';
            if (pct <= 40) bar.style.background = 'var(--coral)';
            else if (pct <= 70) bar.style.background = '#FFA726';
            else bar.style.background = 'var(--accent2)';
        }

        // ===== MESSAGES =====
        function showMessage(msg, type) {
            const el = document.getElementById('authMessage');
            el.textContent = msg;
            el.className = 'auth-message ' + type;
        }

        function hideMessage() {
            const el = document.getElementById('authMessage');
            el.className = 'auth-message';
            el.textContent = '';
        }

        function getErrorMessage(error) {
            const map = {
                'Invalid login credentials': 'メールアドレスまたはパスワードが正しくありません',
                'Email not confirmed': 'メールアドレスの確認が完了していません',
                'User already registered': 'このメールアドレスは既に登録されています',
                'Password should be at least 6 characters': 'パスワードは6文字以上にしてください',
                'Signup requires a valid password': 'パスワードを入力してください',
            };
            return map[error.message] || error.message || 'エラーが発生しました';
        }

        // ===== REDIRECT AFTER AUTH =====
        async function redirectAfterAuth(user) {
            try {
                const { data: profile } = await _sb.from('profiles').select('username').eq('id', user.id).single();
                if (profile) {
                    window.location.href = 'SELEKT_Dashboard.html';
                } else {
                    window.location.href = 'SELEKT_Setup.html';
                }
            } catch {
                window.location.href = 'SELEKT_Setup.html';
            }
        }

        // ===== CHECK IF ALREADY LOGGED IN =====
        (async function() {
            const user = await getCurrentUser();
            if (user) {
                redirectAfterAuth(user);
            }
        })();
    </script>
</body>

</html>
