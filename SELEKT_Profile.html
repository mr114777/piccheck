<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELEKT — プロフィール</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0D0F14;
            --surface: #13161E;
            --surface2: #1A1E28;
            --surface3: #222736;
            --border: #2A2F3E;
            --border2: #333849;
            --text: #E8EAF0;
            --text-sub: #7B849A;
            --text-dim: #454C60;
            --accent: #4A9EE0;
            --accent2: #3BBFA5;
            --coral: #FF6B6B;
            --green: #4CAF7D;
            --yellow: #F5C842;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            white-space: nowrap;
        }

        .logo span {
            opacity: 0.5;
        }

        .topbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
        }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sub);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-link.active {
            background: var(--surface3);
            color: var(--text);
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== HERO HEADER ===== */
        .profile-hero {
            position: relative;
            padding: 48px 24px 32px;
            text-align: center;
            overflow: hidden;
        }

        .profile-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 600px 300px at 50% 0%, rgba(74, 158, 224, 0.08), transparent),
                radial-gradient(ellipse 400px 200px at 30% 100%, rgba(59, 191, 165, 0.05), transparent);
            pointer-events: none;
        }

        .avatar-wrap {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .avatar-large {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #3578C4, var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: 800;
            color: #fff;
            font-family: 'Syne', sans-serif;
            box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px rgba(74, 158, 224, 0.3), 0 8px 32px rgba(74, 158, 224, 0.2);
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 2px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 2px));
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            font-family: 'Syne', 'Zen Kaku Gothic New', sans-serif;
        }

        .profile-id {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 14px;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .badge-role {
            background: rgba(74, 158, 224, 0.12);
            color: var(--accent);
            border: 1px solid rgba(74, 158, 224, 0.25);
        }

        .badge-plan {
            border: 1px solid rgba(123, 132, 154, 0.3);
        }

        .badge-plan.free {
            background: rgba(123, 132, 154, 0.1);
            color: var(--text-sub);
        }

        .badge-plan.basic {
            background: rgba(74, 158, 224, 0.1);
            color: var(--accent);
            border-color: rgba(74, 158, 224, 0.3);
        }

        .badge-plan.pro {
            background: rgba(59, 191, 165, 0.1);
            color: var(--accent2);
            border-color: rgba(59, 191, 165, 0.3);
        }

        /* ===== BIO ===== */
        .bio-section {
            max-width: 520px;
            margin: 0 auto 8px;
            padding: 0 24px;
            text-align: center;
        }

        .bio-text {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bio-text.placeholder {
            font-style: italic;
            color: var(--text-dim);
        }

        /* ===== MAIN CONTENT ===== */
        .main {
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 24px 80px;
        }

        /* ===== PORTFOLIO ===== */
        .section {
            margin-bottom: 28px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title svg {
            opacity: 0.5;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .portfolio-slot {
            aspect-ratio: 1;
            border-radius: 12px;
            background: var(--surface);
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .portfolio-slot:hover {
            border-color: var(--accent);
            background: rgba(74, 158, 224, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .portfolio-slot.filled {
            border: none;
        }

        .portfolio-slot.filled img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.3s;
        }

        .portfolio-slot.filled:hover img {
            transform: scale(1.05);
        }

        .portfolio-slot .remove-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: var(--coral);
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: background 0.15s;
        }

        .portfolio-slot.filled:hover .remove-btn {
            display: flex;
        }

        .portfolio-slot .remove-btn:hover {
            background: rgba(255, 107, 107, 0.3);
        }

        .slot-placeholder {
            color: var(--text-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .slot-placeholder svg {
            opacity: 0.4;
        }

        .slot-placeholder span {
            font-size: 9px;
            opacity: 0.5;
            letter-spacing: 0.3px;
        }

        /* ===== CARD ===== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: var(--border2);
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title svg {
            opacity: 0.5;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 158, 224, 0.1);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-dim);
        }

        .form-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
            max-height: 160px;
            line-height: 1.6;
        }

        .char-count {
            text-align: right;
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
            transition: color 0.2s;
        }

        .char-count.warning {
            color: var(--yellow);
        }

        .char-count.over {
            color: var(--coral);
        }

        /* Role grid */
        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .role-card {
            padding: 12px 10px;
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-card:hover {
            border-color: var(--text-dim);
        }

        .role-card.selected {
            border-color: var(--accent);
            background: rgba(74, 158, 224, 0.06);
            box-shadow: 0 0 0 1px rgba(74, 158, 224, 0.15);
        }

        .role-card .role-icon {
            margin-bottom: 4px;
            opacity: 0.6;
        }

        .role-card.selected .role-icon {
            opacity: 1;
        }

        .role-card .role-name {
            font-size: 12px;
            font-weight: 600;
        }

        .role-card .role-desc {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 1px;
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), #3578C4);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-outline {
            width: 100%;
            padding: 11px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-sub);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: var(--text-dim);
            color: var(--text);
        }

        .btn-danger {
            width: 100%;
            padding: 11px;
            background: rgba(255, 107, 107, 0.06);
            border: 1px solid rgba(255, 107, 107, 0.15);
            border-radius: 10px;
            color: var(--coral);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: rgba(255, 107, 107, 0.12);
            border-color: rgba(255, 107, 107, 0.3);
        }

        /* ===== STAT ROW ===== */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(42, 47, 62, 0.5);
        }

        .stat-row:last-of-type {
            border-bottom: none;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-sub);
        }

        .stat-value {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .usage-bar-sm {
            width: 80px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .usage-bar-sm .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }

        /* Upgrade link */
        .upgrade-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(59, 191, 165, 0.06), rgba(74, 158, 224, 0.06));
            border: 1px solid rgba(59, 191, 165, 0.15);
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.1s;
        }

        .upgrade-link:hover {
            border-color: rgba(59, 191, 165, 0.4);
            transform: translateY(-1px);
        }

        .upgrade-link .upgrade-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent2);
        }

        .upgrade-link .upgrade-desc {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 1px;
        }

        .upgrade-link .arrow {
            margin-left: auto;
            color: var(--accent2);
            font-size: 16px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 24px;
            font-size: 13px;
            color: var(--text);
            z-index: 999;
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: rgba(76, 175, 125, 0.4);
            color: var(--green);
        }

        /* ===== DANGER SECTION ===== */
        .danger-section {
            border-color: rgba(255, 107, 107, 0.1);
        }

        .danger-section .card-title {
            color: rgba(255, 107, 107, 0.7);
        }

        /* ===== SOCIAL LINKS ===== */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 14px;
        }

        .social-icon-link {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            text-decoration: none;
            transition: all 0.2s;
        }

        .social-icon-link:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(74, 158, 224, 0.08);
            transform: translateY(-2px);
        }

        .social-icon-link.x:hover {
            color: #fff;
            border-color: #fff;
        }

        .social-icon-link.instagram:hover {
            color: #E4405F;
            border-color: #E4405F;
        }

        .social-icon-link.youtube:hover {
            color: #FF0000;
            border-color: #FF0000;
        }

        .social-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .social-input-group:last-child {
            margin-bottom: 0;
        }

        .social-input-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
        }

        .social-input-group .form-input {
            flex: 1;
            padding: 10px 12px;
            font-size: 13px;
        }

        /* Hidden file input */
        .hidden-input {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .topbar {
                padding: 0 12px;
                gap: 8px;
            }

            .nav-links {
                display: none;
            }

            .main {
                padding: 20px 16px 80px;
            }

            .profile-hero {
                padding: 32px 16px 24px;
            }

            .avatar-wrap {
                width: 88px;
                height: 88px;
            }

            .avatar-large {
                width: 88px;
                height: 88px;
                font-size: 36px;
            }

            .profile-name {
                font-size: 24px;
            }

            .portfolio-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }

            .card {
                padding: 20px 16px;
                border-radius: 14px;
            }

            .role-grid {
                gap: 6px;
            }

            .bio-section {
                padding: 0 16px;
            }
        }

        @media (max-width: 380px) {
            .portfolio-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>

    <!-- Topbar -->
    <div class="topbar">
        <a class="logo" href="SELEKT_Dashboard.html">SE<span>LEKT</span></a>
        <div class="topbar-divider"></div>
        <div class="nav-links">
            <a class="nav-link" href="SELEKT_Dashboard.html" data-i18n="navDashboard">ダッシュボード</a>
            <a class="nav-link" href="SELEKT_Upload.html" data-i18n="navUpload">アップロード</a>
            <a class="nav-link" href="SELEKT_Pricing.html" data-i18n="navPlan">プラン</a>
            <a class="nav-link active" href="SELEKT_Profile.html" data-i18n="navProfile">プロフィール</a>
        </div>
        <div class="topbar-right">
            <div style="display:flex;gap:4px">
                <button class="lang-btn" onclick="setLang('ja')" id="langJa"
                    style="background:none;border:1px solid var(--border2);color:var(--text-sub);padding:2px 6px;border-radius:4px;font-size:10px;cursor:pointer">JP</button>
                <button class="lang-btn" onclick="setLang('en')" id="langEn"
                    style="background:none;border:1px solid var(--border2);color:var(--text-sub);padding:2px 6px;border-radius:4px;font-size:10px;cursor:pointer">EN</button>
                <button class="lang-btn" onclick="setLang('zh')" id="langZh"
                    style="background:none;border:1px solid var(--border2);color:var(--text-sub);padding:2px 6px;border-radius:4px;font-size:10px;cursor:pointer">中</button>
            </div>
        </div>
    </div>

    <!-- Profile Hero -->
    <div class="profile-hero">
        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar-large" id="avatarLarge">?</div>
        </div>
        <div class="profile-name" id="profileName">---</div>
        <div class="profile-id" id="profileId">@---</div>
        <div class="badge-row">
            <span class="badge badge-role" id="roleBadge">---</span>
            <span class="badge badge-plan" id="planBadge">FREE</span>
        </div>
        <div class="social-row" id="socialRow" style="display:none">
            <!-- Rendered by JS when links exist -->
        </div>
    </div>

    <!-- Bio Section -->
    <div class="bio-section">
        <div class="bio-text" id="bioDisplay"></div>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Portfolio -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span data-i18n="portfolio">ポートフォリオ</span>
                </div>
            </div>
            <div class="portfolio-grid" id="portfolioGrid">
                <!-- Slots rendered by JS -->
            </div>
        </div>

        <!-- Edit Profile -->
        <div class="section">
            <div class="card">
                <div class="card-title">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                    <span data-i18n="editProfile">プロフィール編集</span>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="displayName">表示名</label>
                    <input class="form-input" type="text" id="editName" placeholder="表示名を入力">

                bioPlaceholder: 'Write a short bio (max 250 chars)', userId: 'User ID',

                portfolio: '作品集', addPhoto: '添加',
                editProfile: '编辑资料', displayName: '显示名称', bio: '自我介绍',
                bioPlaceholder: '写一段简短的自我介绍（最多250字）', userId: '用户ID',
                yourRole: '您的角色',
                socialLinks: '社交链接',
                rolePhotographer: '摄影师', rolePhotographerDesc: '发送照片',
                roleModel: '模特', roleModelDesc: '接收照片',

                pageTitle: 'SELEKT — 个人资料',
            }
        };

        const ROLE_LABELS = {
            ja: { photographer: 'カメラマン', model: 'モデル', company: '企業', private: 'プライベート' },
            en: { photographer: 'Photographer', model: 'Model', company: 'Company', private: 'Private' },
            zh: { photographer: '摄影师', model: '模特', company: '企业', private: '个人' },
        };

        let _lang = localStorage.getItem('selekt-lang') || 'ja';
        function pt(key) { return (PROFILE_I18N[_lang] && PROFILE_I18N[_lang][key]) || PROFILE_I18N.ja[key] || key; }

        function setLang(lang) {
            _lang = lang;
            localStorage.setItem('selekt-lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = pt(el.dataset.i18n));
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = pt(el.dataset.i18nPlaceholder));
            document.title = pt('pageTitle');
            document.querySelectorAll('.lang-btn').forEach(b => b.style.borderColor = 'var(--border2)');
            const active = document.getElementById('lang' + lang.charAt(0).toUpperCase() + lang.slice(1));
            if (active) active.style.borderColor = 'var(--accent)';
            // Update bio placeholder
            const bioEl = document.getElementById('editBio');
            if (bioEl) bioEl.placeholder = pt('bioPlaceholder');
            if (currentUser) updateUI();
        }

        function selectRole(el) {
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedRole = el.dataset.role;
        }

        function updateUI() {
            if (!currentUser) return;
            document.getElementById('avatarLarge').textContent = currentUser.displayName.charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = currentUser.displayName;
            document.getElementById('profileId').textContent = `@${currentUser.id}`;

            const roleLabel = (ROLE_LABELS[_lang] || ROLE_LABELS.ja)[currentUser.role] || currentUser.role;
            document.getElementById('roleBadge').textContent = roleLabel;

            const planLabel = { pro: 'PRO', basic: 'BASIC' }[currentUser.plan] || 'FREE';
            const planBadge = document.getElementById('planBadge');
            planBadge.textContent = planLabel;
            planBadge.className = `badge badge-plan ${currentUser.plan || 'free'}`;

            document.getElementById('statPlan').textContent = planLabel;
            document.getElementById('editName').value = currentUser.displayName;
            document.getElementById('editId').value = currentUser.id;

            // Bio
            const bio = currentUser.bio || '';
            document.getElementById('editBio').value = bio;
            updateCharCount();
            const bioDisplay = document.getElementById('bioDisplay');
            if (bio) {
                bioDisplay.textContent = bio;
                bioDisplay.classList.remove('placeholder');
            } else {
                bioDisplay.textContent = pt('noBio');
                bioDisplay.classList.add('placeholder');
            }

            // Role
            document.querySelectorAll('.role-card').forEach(c => c.classList.toggle('selected', c.dataset.role === currentUser.role));
            selectedRole = currentUser.role;

            // Social links - form
            document.getElementById('editX').value = currentUser.socialX || '';
            document.getElementById('editInstagram').value = currentUser.socialInstagram || '';
            document.getElementById('editYoutube').value = currentUser.socialYoutube || '';

            // Social links - display in hero
            renderSocialRow();

            // Hide upgrade for pro
            if (currentUser.plan === 'pro') document.getElementById('upgradeBanner').style.display = 'none';

            renderPortfolio();
        }

        function renderSocialRow() {
            const row = document.getElementById('socialRow');
            const links = [
                { key: 'socialX', cls: 'x', svg: '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>' },
                { key: 'socialInstagram', cls: 'instagram', svg: '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>' },
                { key: 'socialYoutube', cls: 'youtube', svg: '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>' },
            ];
            const active = links.filter(l => currentUser[l.key]);
            if (active.length === 0) { row.style.display = 'none'; return; }
            row.style.display = 'flex';
            row.innerHTML = active.map(l => `<a href="${currentUser[l.key]}" target="_blank" rel="noopener" class="social-icon-link ${l.cls}">${l.svg}</a>`).join('');
        }

        function updateCharCount() {
            const textarea = document.getElementById('editBio');
            const counter = document.getElementById('charCount');
            const len = textarea.value.length;
            counter.textContent = `${len} / 250`;
            counter.className = 'char-count' + (len > 230 ? (len > 250 ? ' over' : ' warning') : '');
        }

        // ===== PORTFOLIO =====
        function renderPortfolio() {
            const grid = document.getElementById('portfolioGrid');
            grid.innerHTML = '';

            for (let i = 0; i < MAX_PORTFOLIO; i++) {
                const slot = document.createElement('div');
                slot.className = 'portfolio-slot' + (portfolioPhotos[i] ? ' filled' : '');

                if (portfolioPhotos[i]) {
                    slot.innerHTML = `
                        <img src="${portfolioPhotos[i]}" alt="Portfolio ${i + 1}">
                        <button class="remove-btn" onclick="removePortfolioPhoto(${i}, event)" title="削除">✕</button>
                    `;
                } else {
                    slot.innerHTML = `
                        <div class="slot-placeholder">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </div>
                    `;
                    slot.onclick = () => { _uploadSlotIdx = i; document.getElementById('portfolioInput').click(); };
                }

                grid.appendChild(slot);
            }
        }

        function handlePortfolioUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (ev) {
                // Resize to max 600px for localStorage efficiency
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const maxSize = 600;
                    let w = img.width, h = img.height;
                    if (w > maxSize || h > maxSize) {
                        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                        else { w = Math.round(w * maxSize / h); h = maxSize; }
                    }
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

                    if (_uploadSlotIdx >= 0 && _uploadSlotIdx < MAX_PORTFOLIO) {
                        portfolioPhotos[_uploadSlotIdx] = dataUrl;
                    } else {
                        portfolioPhotos.push(dataUrl);
                    }

                    savePortfolio();
                    renderPortfolio();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        }

        function removePortfolioPhoto(idx, e) {
            e.stopPropagation();
            portfolioPhotos.splice(idx, 1);
            savePortfolio();
            renderPortfolio();
        }

        function savePortfolio() {
            localStorage.setItem('selekt_portfolio', JSON.stringify(portfolioPhotos));
        }

        function loadPortfolio() {
            try {
                const stored = localStorage.getItem('selekt_portfolio');
                if (stored) portfolioPhotos = JSON.parse(stored);
            } catch (e) { }
        }

        // ===== SAVE PROFILE =====
        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (type ? ` ${type}` : '');
            setTimeout(() => toast.className = 'toast', 2500);
        }

        async function saveProfile() {
            const newName = document.getElementById('editName').value.trim();
            const newBio = document.getElementById('editBio').value.trim().substring(0, 250);
            if (!newName) return;

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            currentUser.displayName = newName;
            currentUser.bio = newBio;
            if (selectedRole) currentUser.role = selectedRole;

            // Social links
            currentUser.socialX = document.getElementById('editX').value.trim();
            currentUser.socialInstagram = document.getElementById('editInstagram').value.trim();
            currentUser.socialYoutube = document.getElementById('editYoutube').value.trim();

            try {
                const token = localStorage.getItem('selekt_token');
                if (token) {
                    const res = await fetch(`${API}/api/auth/update-profile`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ displayName: newName, role: selectedRole, bio: newBio, socialX: currentUser.socialX, socialInstagram: currentUser.socialInstagram, socialYoutube: currentUser.socialYoutube }),
                    });
                    if (res.ok) {
                        const data = await res.json();
                        if (data.user) currentUser = data.user;
                    }
                }
            } catch (e) { }

            localStorage.setItem('selekt_user', JSON.stringify(currentUser));
            updateUI();
            showToast(pt('saved'), 'success');
            setTimeout(() => btn.disabled = false, 500);
        }

        function changePassword() { showToast(pt('passwordNotReady')); }

        function logout() {
            localStorage.removeItem('selekt_token');
            localStorage.removeItem('selekt_user');
            window.location.href = 'SELEKT_Auth.html';
        }

        // ===== INIT =====
        async function init() {
            loadPortfolio();

            try {
                const token = localStorage.getItem('selekt_token');
                if (token) {
                    const controller = new AbortController();
                    setTimeout(() => controller.abort(), 3000);
                    const res = await fetch(`${API}/api/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` },
                        signal: controller.signal
                    });
                    if (res.ok) {
                        const data = await res.json();
                        currentUser = data.user;
                        updateUI();
                        return;
                    }
                }
            } catch (e) {
                console.log('API unavailable, using local data');
            }

            const stored = localStorage.getItem('selekt_user');
            if (stored) {
                currentUser = JSON.parse(stored);
                updateUI();
                return;
            }

            // Demo mode
            currentUser = {
                id: 'demo_user',
                displayName: 'Demo User',
                role: 'photographer',
                plan: 'free',
                bio: ''
            };
            updateUI();
            document.getElementById('statProjects').textContent = '5';
        }

        setLang(_lang);
        init();
    </script>
</body>
